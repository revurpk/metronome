<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tala Metronome — ghatam">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a1d6e"/>
      <stop offset="0.55" stop-color="#7b2d8e"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="clay" cx="0.4" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#e7ad72"/>
      <stop offset="0.55" stop-color="#bd7338"/>
      <stop offset="1" stop-color="#73401c"/>
    </radialGradient>
    <radialGradient id="hole" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#3a2415"/>
      <stop offset="1" stop-color="#140b05"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#b)"/>

  <!-- contact shadow -->
  <ellipse cx="32" cy="54" rx="17" ry="3.4" fill="#000" opacity="0.22"/>

  <!-- ghatam clay body -->
  <path d="M32 18
           C 22 18, 16.5 23, 14.5 31
           C 12.5 40, 16 50, 24 53
           C 29 55, 35 55, 40 53
           C 48 50, 51.5 40, 49.5 31
           C 47.5 23, 42 18, 32 18 Z" fill="url(#clay)"/>

  <!-- decorative band near the shoulder -->
  <path d="M18.5 27 C 26 24.5, 38 24.5, 45.5 27" fill="none" stroke="#5c3015" stroke-width="1.4" opacity="0.45"/>

  <!-- sheen highlight on the belly -->
  <ellipse cx="25" cy="32" rx="6" ry="9" fill="#ffe9cf" opacity="0.18"/>

  <!-- mouth: clay rim + dark opening -->
  <ellipse cx="32" cy="19" rx="8.6" ry="3.6" fill="#9a5526"/>
  <ellipse cx="32" cy="18.4" rx="6" ry="2.4" fill="url(#hole)"/>
</svg>
