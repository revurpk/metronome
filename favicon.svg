<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tala Metronome — mridangam">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a1d6e"/>
      <stop offset="0.55" stop-color="#7b2d8e"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9933f"/>
      <stop offset="1" stop-color="#7a481c"/>
    </linearGradient>
    <radialGradient id="s" cx="0.42" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#fdf6e4"/>
      <stop offset="1" stop-color="#dcc89c"/>
    </radialGradient>
    <radialGradient id="k" cx="0.4" cy="0.36" r="0.85">
      <stop offset="0" stop-color="#404048"/>
      <stop offset="1" stop-color="#0d0d12"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#b)"/>
  <!-- mridangam barrel, horizontal -->
  <path d="M14 26 C 26 22, 38 23, 46 27 L 46 44 C 38 48, 26 49, 14 45 Z" fill="url(#w)"/>
  <!-- far (left) head -->
  <ellipse cx="14" cy="35.5" rx="3.4" ry="9.5" fill="#5d3618"/>
  <ellipse cx="15.5" cy="35.5" rx="2" ry="8" fill="#caa86f"/>
  <!-- lacing straps -->
  <g stroke="#6e3f18" stroke-width="1.6" opacity="0.5">
    <line x1="23" y1="24" x2="21" y2="47"/>
    <line x1="32" y1="24" x2="31" y2="48"/>
  </g>
  <!-- near (right) head facing viewer with syahi -->
  <ellipse cx="46" cy="35.5" rx="11" ry="13.5" fill="#5d3618"/>
  <ellipse cx="46" cy="35.5" rx="9" ry="11.5" fill="url(#s)"/>
  <ellipse cx="46" cy="35.5" rx="7" ry="9.3" fill="none" stroke="#17171c" stroke-width="2" opacity="0.85"/>
  <ellipse cx="46" cy="35.5" rx="4.2" ry="5.6" fill="url(#k)"/>
</svg>
