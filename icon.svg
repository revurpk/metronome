<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tala Metronome — tabla, mridangam and ghatam">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a1d6e"/>
      <stop offset="0.55" stop-color="#7b2d8e"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7edf3"/>
      <stop offset="0.5" stop-color="#9aa6b4"/>
      <stop offset="1" stop-color="#5b6675"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9b574"/>
      <stop offset="0.5" stop-color="#c8853f"/>
      <stop offset="1" stop-color="#8f5320"/>
    </linearGradient>
    <linearGradient id="woodM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9933f"/>
      <stop offset="0.5" stop-color="#a9692b"/>
      <stop offset="1" stop-color="#7a481c"/>
    </linearGradient>
    <radialGradient id="skinB" cx="0.42" cy="0.38" r="0.75">
      <stop offset="0" stop-color="#fbf3df"/>
      <stop offset="1" stop-color="#d9c69b"/>
    </radialGradient>
    <radialGradient id="skinD" cx="0.42" cy="0.38" r="0.75">
      <stop offset="0" stop-color="#fdf6e4"/>
      <stop offset="1" stop-color="#e2cfa3"/>
    </radialGradient>
    <radialGradient id="skinM" cx="0.42" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#fdf6e4"/>
      <stop offset="1" stop-color="#dcc89c"/>
    </radialGradient>
    <radialGradient id="syahi" cx="0.4" cy="0.36" r="0.8">
      <stop offset="0" stop-color="#4b4b52"/>
      <stop offset="0.5" stop-color="#23232a"/>
      <stop offset="1" stop-color="#0c0c10"/>
    </radialGradient>
    <radialGradient id="clayG" cx="0.4" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#e7ad72"/>
      <stop offset="0.55" stop-color="#bd7338"/>
      <stop offset="1" stop-color="#73401c"/>
    </radialGradient>
    <radialGradient id="holeG" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#3a2415"/>
      <stop offset="1" stop-color="#140b05"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- tala-cycle arc of beats -->
  <g fill="#fde68a">
    <circle cx="150" cy="66" r="6.5" opacity="0.7"/>
    <circle cx="210" cy="50" r="8.5"/>
    <circle cx="274" cy="44" r="11"/>
    <circle cx="338" cy="50" r="8.5"/>
    <circle cx="398" cy="66" r="6.5" opacity="0.7"/>
  </g>

  <!-- ===== TABLA PAIR (top-centre) ===== -->
  <g transform="translate(118,-24) scale(0.5)">
    <ellipse cx="256" cy="452" rx="180" ry="24" fill="#000" opacity="0.18"/>
    <!-- bayan -->
    <path d="M96 246 C 74 318, 84 392, 120 432 A 84 28 0 0 0 288 432 C 304 392, 300 318, 280 246 Z" fill="url(#metal)"/>
    <g stroke="#3f4753" stroke-width="6" opacity="0.5">
      <line x1="120" y1="262" x2="132" y2="430"/><line x1="160" y1="258" x2="166" y2="438"/>
      <line x1="208" y1="258" x2="210" y2="440"/><line x1="252" y1="260" x2="246" y2="438"/>
    </g>
    <ellipse cx="188" cy="242" rx="98" ry="40" fill="url(#skinB)"/>
    <ellipse cx="188" cy="242" rx="80" ry="32" fill="none" stroke="#cdb98c" stroke-width="3" opacity="0.8"/>
    <ellipse cx="188" cy="242" rx="42" ry="18" fill="url(#syahi)"/>
    <!-- dayan -->
    <path d="M330 270 C 314 330, 320 394, 348 430 A 64 22 0 0 0 476 430 C 490 394, 492 330, 474 270 Z" fill="url(#wood)"/>
    <g stroke="#6e3f18" stroke-width="5" opacity="0.45">
      <line x1="346" y1="284" x2="356" y2="430"/><line x1="384" y1="280" x2="388" y2="436"/>
      <line x1="424" y1="280" x2="420" y2="436"/><line x1="460" y1="284" x2="452" y2="430"/>
    </g>
    <ellipse cx="402" cy="268" rx="74" ry="30" fill="url(#skinD)"/>
    <ellipse cx="402" cy="268" rx="58" ry="23" fill="none" stroke="#d8c089" stroke-width="2.5" opacity="0.8"/>
    <ellipse cx="402" cy="268" rx="30" ry="13" fill="url(#syahi)"/>
  </g>

  <!-- ===== MRIDANGAM (lower-left, horizontal) ===== -->
  <g transform="translate(-78,86) scale(0.7)">
    <ellipse cx="248" cy="452" rx="200" ry="26" fill="#000" opacity="0.24"/>
    <path d="M118 316 C 210 300, 300 304, 360 318 L 360 426 C 300 440, 210 444, 118 428 Z" fill="url(#woodM)"/>
    <ellipse cx="118" cy="372" rx="20" ry="58" fill="#5d3618"/>
    <ellipse cx="122" cy="372" rx="13" ry="50" fill="#caa86f"/>
    <g stroke="#6e3f18" stroke-width="7" opacity="0.5" fill="none">
      <path d="M168 308 L150 436"/><path d="M226 305 L214 440"/>
      <path d="M286 306 L280 440"/><path d="M332 312 L330 436"/>
    </g>
    <ellipse cx="372" cy="372" rx="60" ry="72" fill="#5d3618"/>
    <ellipse cx="372" cy="372" rx="52" ry="64" fill="url(#skinM)"/>
    <ellipse cx="372" cy="372" rx="44" ry="55" fill="none" stroke="#1a1a20" stroke-width="9" opacity="0.85"/>
    <ellipse cx="372" cy="372" rx="26" ry="32" fill="url(#syahi)"/>
    <ellipse cx="362" cy="360" rx="9" ry="9" fill="#6b6b73" opacity="0.55"/>
  </g>

  <!-- ===== GHATAM (lower-right, clay pot) ===== -->
  <g>
    <ellipse cx="386" cy="470" rx="78" ry="16" fill="#000" opacity="0.24"/>
    <path d="M386 300
             C 334 300, 306 327, 298 366
             C 290 410, 308 455, 343 469
             C 367 479, 405 479, 429 469
             C 464 455, 482 410, 474 366
             C 466 327, 438 300, 386 300 Z" fill="url(#clayG)"/>
    <!-- decorative shoulder band -->
    <path d="M312 334 C 350 318, 422 318, 460 334" fill="none" stroke="#5c3015" stroke-width="3.5" opacity="0.45"/>
    <!-- belly sheen -->
    <ellipse cx="346" cy="360" rx="16" ry="26" fill="#ffe9cf" opacity="0.16"/>
    <!-- mouth: clay rim + dark opening -->
    <ellipse cx="386" cy="303" rx="23" ry="9.5" fill="#9a5526"/>
    <ellipse cx="386" cy="301" rx="16" ry="6.3" fill="url(#holeG)"/>
  </g>
</svg>
